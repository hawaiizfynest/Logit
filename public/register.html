<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logit — Request Access</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
  .reg-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; }
  .reg-card { background:var(--surface); border:1px solid var(--border2); border-radius:10px; padding:40px 44px; width:100%; max-width:460px; position:relative; z-index:1; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
  .success-box { background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); border-radius:8px; padding:24px; text-align:center; }
  .error-box { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:6px; padding:10px 14px; color:var(--red); font-size:0.88rem; margin-bottom:14px; display:none; }
</style>
</head>
<body>
<div class="reg-wrap">
  <div class="login-bg-grid"></div>
  <div class="reg-card" id="reg-card">
    <div class="login-brand" style="margin-bottom:28px">
      <div class="login-logo">LOG<span>IT</span></div>
      <div class="login-tagline">Request Technician Access</div>
    </div>

    <div id="success-view" class="success-box hidden">
      <div style="font-size:2rem;margin-bottom:12px">✅</div>
      <div style="font-family:var(--font-d);font-size:1.2rem;font-weight:800;color:var(--green);margin-bottom:8px">Request Submitted!</div>
      <div style="color:var(--text-dim);font-size:0.9rem;line-height:1.6">Your request has been sent to the admin for approval. You'll be able to log in once it's approved.</div>
      <a href="/" class="btn btn-secondary" style="margin-top:20px;display:inline-flex">← Back to Login</a>
    </div>

    <div id="reg-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="r-name" placeholder="John Smith">
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="r-username" placeholder="jsmith" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Email Address <span class="text-muted">(optional)</span></label>
        <input type="email" id="r-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="r-pass" placeholder="Min. 6 characters">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="r-pass2" placeholder="Re-enter password">
      </div>
      <div class="error-box" id="r-error"></div>
      <button class="btn btn-primary btn-full btn-lg" id="r-btn" onclick="submitRequest()">
        Submit Request <span class="btn-arrow">→</span>
      </button>
      <div style="text-align:center;margin-top:16px">
        <a href="/" class="text-muted" style="font-size:0.85rem">Already have an account? Sign in</a>
      </div>
    </div>
  </div>
</div>
<script>
async function submitRequest() {
  const name            = document.getElementById('r-name').value.trim();
  const username        = document.getElementById('r-username').value.trim();
  const email           = document.getElementById('r-email').value.trim();
  const password        = document.getElementById('r-pass').value;
  const confirmPassword = document.getElementById('r-pass2').value;
  const errEl           = document.getElementById('r-error');
  const btn             = document.getElementById('r-btn');

  errEl.style.display = 'none';

  if (!name || !username || !password) { errEl.textContent = 'Name, username and password are required.'; errEl.style.display='block'; return; }
  if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display='block'; return; }
  if (password !== confirmPassword) { errEl.textContent = 'Passwords do not match.'; errEl.style.display='block'; return; }

  btn.disabled = true; btn.textContent = 'Submitting…';

  try {
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, username, email, password, confirmPassword }),
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Something went wrong.'; errEl.style.display='block'; return; }
    document.getElementById('reg-form').classList.add('hidden');
    document.getElementById('success-view').classList.remove('hidden');
  } catch(e) {
    errEl.textContent = 'Network error. Please try again.';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Submit Request <span class="btn-arrow">→</span>';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') submitRequest(); });
</script>
</body>
</html>
